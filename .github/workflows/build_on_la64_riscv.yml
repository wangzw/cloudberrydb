name: Build

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  push:
    branches: [ "main" ]

defaults:
  run:
    shell: bash -ileo pipefail {0}

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Build on loongarch64
            image: ghcr.io/wangzw/openeuler-24.03-loongarch64
          - name: Build on riscv64
            image: ghcr.io/wangzw/openeuler-24.03-riscv64
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    container:
      image: oraclelinux:9

    services:
      runtime:
        image: ${{ matrix.image }}
        options: -e CORE=16 -e MEMORY=16 -e DISK=20 --name target --hostname target

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Install tmate
        run: |
          yum install -y epel-release
          yum install -y tmate sshpass

      - name: Wait for target instance started
        run: |
          set -eux
          
          cmd="sshpass -p vagrant ssh -F /dev/null -l root -o StrictHostKeyChecking=no -p 3957 target 'uname -a' 2>/dev/null"
          timeout 10m bash -c "until ${cmd}; do sleep 1; done"
          
          sshpass -p vagrant scp -P 3957 -r ${GITHUB_WORKSPACE} root@target:/code

      - name: "${{ matrix.name }}"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: target
          port: 3957
          username: root
          password: vagrant
          script: |
            bash -eux
            cd /code
            
            yum group install -y "Development Tools"
            yum install -y apr-devel bison bzip2-devel cmake3 flex krb5-devel libcurl-devel libevent-devel libkadm5 libxml2-devel libzstd-devel openssl-devel perl-ExtUtils-Embed perl-ExtUtils-MakeMaker perl-File-Compare python3 python3-devel python3-pip python3-psutil python3-psutil python3-psycopg2 python3-pyyaml readline-devel rsync xerces-c-devel zlib-devel
         
            CPUS=$(grep -c ^processor /proc/cpuinfo)
            ./configure --with-perl --with-python --with-libxml --with-gssapi --prefix=`pwd`/inst
            
            make -j${CPUS}
            make -j${CPUS} install
